<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toDoit</title>
    <script>
        // /share/{shareId} 경로면 share/index.html과 동일한 로직 실행
        var path = window.location.pathname;
        if (path.startsWith('/share/')) {
            var shareId = path.replace('/share/', '').replace('/', '');
            if (shareId) {
                window.location.href = 'todoit://share/' + shareId;
                setTimeout(function() {
                    var ua = navigator.userAgent || navigator.vendor;
                    if (/android/i.test(ua)) {
                        window.location.href = 'https://play.google.com/store/apps/details?id=com.wemayvin.todoit';
                    } else if (/iPad|iPhone|iPod/.test(ua)) {
                        window.location.href = 'https://apps.apple.com/app/todoit/id6742044928';
                    }
                }, 2000);
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #333; background: #f5f5f5; }
        .container { text-align: center; padding: 24px; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        p { font-size: 1rem; color: #666; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 12px 32px; background: #333; color: #fff; text-decoration: none; border-radius: 8px; font-size: 1rem; margin: 6px; }
        .btn:hover { background: #555; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>toDoit</h1>
        <p id="message">앱을 여는 중...</p>
        <a id="btn-ios" class="btn hidden" href="https://apps.apple.com/app/todoit/id6742044928">App Store에서 다운로드</a>
        <a id="btn-android" class="btn hidden" href="https://play.google.com/store/apps/details?id=com.wemayvin.todoit">Google Play에서 다운로드</a>
        <script>
            var ua = navigator.userAgent || navigator.vendor;
            var path = window.location.pathname;
            if (path.startsWith('/share/')) {
                if (/android/i.test(ua)) {
                    document.getElementById('btn-android').classList.remove('hidden');
                } else {
                    document.getElementById('btn-ios').classList.remove('hidden');
                }
            } else {
                document.getElementById('message').textContent = '페이지를 찾을 수 없습니다.';
            }
        </script>
    </div>
</body>
</html>
