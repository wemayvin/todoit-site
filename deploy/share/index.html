<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toDoit - 공유된 페이지</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #333; background: #f5f5f5; }
        .container { text-align: center; padding: 24px; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        p { font-size: 1rem; color: #666; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 12px 32px; background: #333; color: #fff; text-decoration: none; border-radius: 8px; font-size: 1rem; }
        .btn:hover { background: #555; }
    </style>
    <script>
        (function() {
            var path = window.location.pathname;
            var shareId = path.replace('/share/', '').replace('/', '');
            if (!shareId) return;

            // 앱 스킴으로 열기 시도
            var appUrl = 'todoit://share/' + shareId;
            window.location.href = appUrl;

            // 2초 후 스토어로 리다이렉트
            setTimeout(function() {
                var ua = navigator.userAgent || navigator.vendor;
                if (/android/i.test(ua)) {
                    window.location.href = 'https://play.google.com/store/apps/details?id=com.wemayvin.todoit';
                } else if (/iPad|iPhone|iPod/.test(ua)) {
                    window.location.href = 'https://apps.apple.com/app/todoit/id6742044928';
                } else {
                    document.getElementById('message').textContent = 'toDoit 앱에서 열어주세요.';
                }
            }, 2000);
        })();
    </script>
</head>
<body>
    <div class="container">
        <h1>toDoit</h1>
        <p id="message">앱을 여는 중...</p>
        <a class="btn" href="https://apps.apple.com/app/todoit/id6742044928">App Store에서 다운로드</a>
    </div>
</body>
</html>
